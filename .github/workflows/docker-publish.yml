name: Publish Docker Image

on:
  push:
    branches: [ main, prod ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/prod' }}
          type=ref,event=branch
          type=ref,event=tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push Docker image (SQLite)
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        build-args: |
          VITE_APP_BASE_PATH=/
          VITE_SQLITE_SYNC_URL=/

    - name: Extract Docker metadata (Firebase)
      id: meta_firebase
      if: ${{ env.FIREBASE_API_KEY != '' }}
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=raw,value=latest-firebase,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/prod' }}
          type=ref,event=branch,suffix=-firebase
          type=ref,event=tag,suffix=-firebase
          type=semver,pattern={{version}},suffix=-firebase
          type=semver,pattern={{major}}.{{minor}},suffix=-firebase
          type=sha,suffix=-firebase

    - name: Build and push Docker image (Firebase)
      if: ${{ env.FIREBASE_API_KEY != '' }}
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta_firebase.outputs.tags }}
        labels: ${{ steps.meta_firebase.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        build-args: |
          VITE_APP_BASE_PATH=/
          VITE_SQLITE_SYNC_URL=
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL=${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
